<!DOCTYPE html>
<!-- 
  HTML Root File for React Application
  This file is the entry point that loads the React app
-->
<html lang="en">
<head>
  <!-- Set character encoding to UTF-8 for proper text rendering -->
  <meta charset="UTF-8">
  
  <!-- Viewport settings for responsive design on mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Title shown in browser tab -->
  <title>Hospital Management System - Doctor Appointment Booking</title>
  
  <!-- Meta description for search engines -->
  <meta name="description" content="Easy doctor appointment booking system. Find and book appointments with doctors.">
  
  <!-- Preconnect for Google Fonts performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Favicon emoji -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏥</text></svg>">
</head>
<body>
  <!-- Root div where React app will be mounted -->
  <!-- React will render all components inside this div -->
  <div id="root"></div>
  
  <!-- Load React application entry point -->
  <!-- main.jsx is the JavaScript file that initializes React -->
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
